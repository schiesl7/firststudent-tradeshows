// ── Dept normalization: map aliases → canonical name ─────────────────────────
// "Alt" and "First Alt" are the same; "Services"/"First Serves" = "First Services"
const DEPT_ALIAS = {
  "Alt":           "First Alt",
  "First Alt":     "First Alt",
  "Services":      "First Services",
  "First Serves":  "First Services",
  "First Services":"First Services",
  "DBD":           "DBD",
  "Charter":       "Charter",
  "Ops":           "Ops",
  "AGM":           "AGM",
  "Location":      "Location",
  "Special Ed":    "Special Ed",
};

function normalizeDept(raw) {
  if (!raw) return "";
  return raw.split(",").map(d => {
    const t = d.trim();
    return DEPT_ALIAS[t] || t;
  }).filter((v,i,a)=>a.indexOf(v)===i).join(", "); // dedupe after normalization
}

const DEPT_COLORS = {
  "Charter":       {bg:"#fef3c7",border:"#f59e0b",text:"#92400e",cal:"#f59e0b"},

  "First Services":{bg:"#dcfce7",border:"#22c55e",text:"#14532d",cal:"#22c55e"},
  "DBD":           {bg:"#f3e8ff",border:"#a855f7",text:"#581c87",cal:"#a855f7"},
  "Ops":           {bg:"#fce7f3",border:"#ec4899",text:"#831843",cal:"#ec4899"},
  "AGM":           {bg:"#fdf4ff",border:"#c084fc",text:"#6b21a8",cal:"#c084fc"},

  "default":       {bg:"#f1f5f9",border:"#94a3b8",text:"#334155",cal:"#94a3b8"},
};

// Canonical dept list for filter buttons (display order)
const CANONICAL_DEPTS = ["Charter","First Alt","First Services","DBD","Ops","AGM","Location","Special Ed"];

function getDeptColor(dept) {
  if (!dept) return DEPT_COLORS["default"];
  const first = normalizeDept(dept).split(",")[0].trim();
  return DEPT_COLORS[first] || DEPT_COLORS["default"];
}

function showMatchesDept(show, filterDept) {
  if (filterDept === "All") return true;
  const normalized = normalizeDept(show.department);
  return normalized.split(",").map(d=>d.trim()).includes(filterDept);
}

// ── Storage ───────────────────────────────────────────────────────────────────
function getStored() {
  try { const s=localStorage.getItem("tradeshows_v2"); return s?JSON.parse(s):null; } catch(e){return null;}
}
function saveStored(shows) {
  try { localStorage.setItem("tradeshows_v2",JSON.stringify(shows)); } catch(e){}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtRange(start, end) {
  const s=new Date(start+"T12:00:00"), e=new Date(end+"T12:00:00");
  const o={month:"short",day:"numeric"};
  if(start===end) return s.toLocaleDateString("en-US",o);
  if(s.getMonth()===e.getMonth()&&s.getFullYear()===e.getFullYear())
    return `${s.toLocaleDateString("en-US",o)} – ${e.getDate()}`;
  return `${s.toLocaleDateString("en-US",o)} – ${e.toLocaleDateString("en-US",o)}`;
}

// ── ICS Calendar Invite ───────────────────────────────────────────────────────
function generateICS(show) {
  const pad = n => String(n).padStart(2,"0");
  function toICSDate(dateStr) {
    const d = new Date(dateStr+"T12:00:00");
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  }
  // End date for all-day events in ICS is exclusive (next day)
  const endD = new Date(show.end+"T12:00:00");
  endD.setDate(endD.getDate()+1);
  const endStr = `${endD.getFullYear()}${pad(endD.getMonth()+1)}${pad(endD.getDate())}`;

  const desc = [
    show.city ? `Location: ${show.city}` : "",
    show.website ? `Website: ${show.website}` : "",
    show.boothNumber ? `Booth: ${show.boothNumber}` : "",
    show.attendees ? `Attendees: ${show.attendees}` : "",
    show.hasSponsor && show.sponsorNotes ? `Sponsorship: ${show.sponsorNotes}` : "",
    show.hasSpeaking && show.speakingTitle ? `Speaking: "${show.speakingTitle}" — ${show.speakingWho||""} (${show.speakingWhen||""})` : "",
    show.notes ? `Notes: ${show.notes}` : "",
  ].filter(Boolean).join("\\n");

  const uid = `tradeshow-${show.id}-${Date.now()}@firststudent`;
  const ics = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//First Student Trade Show Calendar//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTART;VALUE=DATE:${toICSDate(show.start)}`,
    `DTEND;VALUE=DATE:${endStr}`,
    `SUMMARY:${show.name}${show.city?" – "+show.city:""}`,
    `DESCRIPTION:${desc}`,
    show.website ? `URL:${show.website}` : "",
    show.city ? `LOCATION:${show.city}` : "",
    "END:VEVENT",
    "END:VCALENDAR"
  ].filter(Boolean).join("\r\n");

  const blob = new Blob([ics], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${show.name.replace(/[^a-z0-9]/gi,"-")}.ics`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Edit Modal ────────────────────────────────────────────────────────────────
function EditModal({show, onSave, onClose, onDelete}) {
  const blank = {name:"",start:"",end:"",city:"",department:"",attendees:"",notes:"",
    website:"",boothNumber:"",hasSponsor:false,sponsorNotes:"",
    hasSpeaking:false,speakingTitle:"",speakingWho:"",speakingWhen:""};
  const [form, setForm] = useState(show ? {...blank,...show} : blank);
  const [section, setSection] = useState("basic"); // basic | details | sponsor | speaking
  const isNew = !show;
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const lbl = {fontSize:11,color:"#8a9bb0",textTransform:"uppercase",letterSpacing:1,marginBottom:4,display:"block"};
  const inp = {width:"100%",background:"#0f1923",border:"1px solid #2d3f52",borderRadius:6,padding:"8px 12px",color:"#e8dcc8",fontSize:14,outline:"none"};
  const DEPT_OPTIONS = ["Charter","First Alt","First Services","DBD","Ops","AGM","Location","Special Ed"];

  const sectionTab = (id, label, hasData) => {
    const active = section===id;
    return (
      <button onClick={()=>setSection(id)} style={{padding:"6px 14px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit",
        background:active?"#c9a84c22":"transparent",color:active?"#c9a84c":"#8a9bb0",
        border:`1px solid ${active?"#c9a84c":"#2d3f52"}`,fontWeight:active?700:400,
        display:"flex",alignItems:"center",gap:5}}>
        {label}{hasData&&!active&&<span style={{width:6,height:6,borderRadius:"50%",background:"#22c55e",display:"inline-block"}}/>}
      </button>
    );
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:660}}>
        <div style={{padding:"16px 22px",borderBottom:"1px solid #2d3f52",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 style={{color:"#c9a84c",fontSize:17}}>{isNew?"Add New Show":"Edit Show"}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#8a9bb0",fontSize:24,cursor:"pointer",lineHeight:1}}>×</button>
        </div>

        {/* Section tabs */}
        <div style={{padding:"10px 22px",borderBottom:"1px solid #1a2d3d",display:"flex",gap:6,flexWrap:"wrap"}}>
          {sectionTab("basic","📋 Basic Info", false)}
          {sectionTab("details","🔗 Details", !!(form.website||form.boothNumber))}
          {sectionTab("sponsor","🏆 Sponsorship", !!form.hasSponsor)}

// ── Cards View ────────────────────────────────────────────────────────────────
function CardView({shows, onEdit}) {
  const [dFilter, setDFilter] = useState("All");
  const [search, setSearch] = useState("");

  const filtered = shows.filter(s=>{
    const dOk = showMatchesDept(s,dFilter);
    if (!dOk) return false;
    if (!search) return true;
    const q = search.toLowerCase();
    return [s.name,s.city,s.attendees,s.notes,s.website,s.boothNumber,s.sponsorNotes,
            s.speakingTitle,s.speakingWho,s.speakingWhen].some(v=>v&&String(v).toLowerCase().includes(q));
  });

  const byMonth = {};
  filtered.forEach(s=>{
    const m=new Date(s.start+"T12:00:00").toLocaleDateString("en-US",{month:"long",year:"numeric"});
    if(!byMonth[m])byMonth[m]=[];
    byMonth[m].push(s);
  });
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:20,alignItems:"center"}}>
        <DeptFilter value={dFilter} onChange={setDFilter}/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search shows, sponsors, speakers…"
          style={{background:"#1a2d3d",border:"1px solid #2d3f52",borderRadius:6,padding:"7px 14px",color:"#e8dcc8",fontSize:13,outline:"none",fontFamily:"inherit",width:260}}/>
        {search&&<button onClick={()=>setSearch("")} style={{background:"transparent",border:"none",color:"#8a9bb0",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>✕ Clear</button>}
      </div>
      {search&&<div style={{fontSize:12,color:"#8a9bb0",marginBottom:16}}>{filtered.length} result{filtered.length!==1?"s":""} for "{search}"</div>}
      {Object.entries(byMonth).map(([month,items])=>(
        <div key={month} style={{marginBottom:40}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <h2 style={{fontSize:19,fontWeight:700,color:"#c9a84c",textTransform:"uppercase",letterSpacing:3,whiteSpace:"nowrap"}}>{month}</h2>
            <div style={{flex:1,height:1,background:"linear-gradient(to right,#c9a84c44,transparent)"}}/>
            <span style={{fontSize:12,color:"#8a9bb0"}}>{items.length} show{items.length!==1?"s":""}</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}}>
            {items.map(s=><ShowCard key={s.id} show={s} onEdit={onEdit}/>)}
          </div>
        </div>
      ))}
      {Object.keys(byMonth).length===0&&<div style={{textAlign:"center",color:"#8a9bb0",padding:60}}>No shows match this filter.</div>}
    </div>
  );
}

// ── Attendees View ────────────────────────────────────────────────────────────
function AttendeesView({shows, onEdit}) {
  const [search, setSearch] = useState("");
  const [dFilter, setDFilter] = useState("All");
  const filtShows = shows.filter(s=>showMatchesDept(s,dFilter));
  const personMap = {};
  filtShows.forEach(show=>{
    if(!show.attendees) return;
    show.attendees.split(",").forEach(raw=>{
      const name=raw.trim(); if(!name) return;
      if(!personMap[name]) personMap[name]=[];
      personMap[name].push(show);
    });
  });
  const sorted = Object.entries(personMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const filtered = search ? sorted.filter(([n])=>n.toLowerCase().includes(search.toLowerCase())) : sorted;
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:12,marginBottom:20,alignItems:"center"}}>
        <DeptFilter value={dFilter} onChange={setDFilter}/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name…"
          style={{background:"#1a2d3d",border:"1px solid #2d3f52",borderRadius:6,padding:"7px 14px",color:"#e8dcc8",fontSize:13,outline:"none",fontFamily:"inherit",width:200}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:12}}>
        {filtered.map(([name,personShows])=>(
          <div key={name} style={{background:"#1a2d3d",border:"1px solid #2d3f52",borderRadius:8,padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#c9a84c"}}>{name}</h3>
              <span style={{fontSize:11,color:"#8a9bb0",background:"#0f1923",padding:"2px 8px",borderRadius:20,border:"1px solid #2d3f52",whiteSpace:"nowrap"}}>{personShows.length} show{personShows.length!==1?"s":""}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {personShows.sort((a,b)=>a.start.localeCompare(b.start)).map(s=>{
                const c=getDeptColor(s.department);
                return (
                  <div key={s.id} onClick={()=>onEdit(s)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 9px",background:"#0f1923",borderRadius:6,cursor:"pointer",border:`1px solid #1e3040`}}>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontSize:12,color:"#e8dcc8",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                      <div style={{fontSize:11,color:"#8a9bb0"}}>{fmtRange(s.start,s.end)}{s.city?` · ${s.city}`:""}</div>
                    </div>
                    <div style={{marginLeft:8,flexShrink:0}}><DeptBadges department={s.department} size="xs"/></div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",color:"#8a9bb0",padding:60}}>No attendees found.</div>}
    </div>
  );
}

// ── Calendar View ─────────────────────────────────────────────────────────────
function CalendarView({shows, onEdit}) {
  const today = new Date();
  const [year, setYear]   = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [dFilter, setDFilter] = useState("All");

  const prevMonth = ()=>{ if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = ()=>{ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const goToday   = ()=>{ setYear(today.getFullYear()); setMonth(today.getMonth()); };

  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();

  const filtShows = shows.filter(s=>showMatchesDept(s,dFilter));

  function showsOnDay(day) {
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
    return filtShows.filter(s=>s.start<=ds&&s.end>=ds);
  }

  const monthName = new Date(year,month,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  return (
    <div>
      {/* Controls */}
      <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={prevMonth} style={{background:"#1a2d3d",border:"1px solid #2d3f52",color:"#c9a84c",width:34,height:34,borderRadius:6,cursor:"pointer",fontSize:18,lineHeight:1}}>‹</button>
          <h2 style={{fontSize:20,fontWeight:700,color:"#c9a84c",letterSpacing:2,minWidth:220,textAlign:"center"}}>{monthName.toUpperCase()}</h2>
          <button onClick={nextMonth} style={{background:"#1a2d3d",border:"1px solid #2d3f52",color:"#c9a84c",width:34,height:34,borderRadius:6,cursor:"pointer",fontSize:18,lineHeight:1}}>›</button>
          <button onClick={goToday} style={{background:"transparent",border:"1px solid #2d3f52",color:"#8a9bb0",padding:"5px 12px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit",marginLeft:4}}>Today</button>
        </div>
      </div>
      <div style={{marginBottom:16}}>
        <DeptFilter value={dFilter} onChange={setDFilter}/>
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
        {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:"#8a9bb0",textTransform:"uppercase",letterSpacing:1,padding:"4px 0"}}>{d}</div>)}
      </div>

      {/* Grid */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {Array(firstDay).fill(null).map((_,i)=>(
          <div key={"x"+i} style={{minHeight:100,background:"#0a131c",borderRadius:4,border:"1px solid #111e2b"}}/>
        ))}
        {Array(daysInMonth).fill(null).map((_,i)=>{
          const day=i+1;
          const isToday=today.getFullYear()===year&&today.getMonth()===month&&today.getDate()===day;
          const dayShows=showsOnDay(day);
          const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          return (
            <div key={day} className="cal-cell" style={{background:isToday?"#1c2f40":"#111e2b",border:isToday?"1.5px solid #c9a84c":"1px solid #1a2d3d"}}>
              <div style={{fontSize:11,color:isToday?"#c9a84c":"#3a4f62",fontWeight:isToday?700:400,textAlign:"right",marginBottom:3}}>{day}</div>
              {dayShows.slice(0,4).map(s=>{
                const c=getDeptColor(s.department);
                const isStart=s.start===dateStr;
                return (
                  <div key={s.id} className="cal-event" onClick={()=>onEdit(s)}
                    title={`${s.name} · ${fmtRange(s.start,s.end)}${s.city?" · "+s.city:""}`}
                    style={{background:c.cal+"28",borderLeft:`2px solid ${c.cal}`,color:c.cal,fontWeight:isStart?700:400,opacity:isStart?1:0.55}}>
                    {isStart ? s.name : "·"}
                  </div>
                );
              })}
              {dayShows.length>4&&<div style={{fontSize:9,color:"#8a9bb0",paddingLeft:3}}>+{dayShows.length-4} more</div>}
            </div>
          );
        })}
      </div>

      {/* Color legend */}
      <div style={{marginTop:16,display:"flex",flexWrap:"wrap",gap:6}}>
        {CANONICAL_DEPTS.map(k=>{const c=DEPT_COLORS[k]||DEPT_COLORS.default;return(
          <span key={k} style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20,background:c.bg,color:c.text,border:`1px solid ${c.border}`}}>{k}</span>
        );})}
      </div>
    </div>
  );
}

// ── Password Gate ─────────────────────────────────────────────────────────────
const PASSWORD = "FirstStudent2026";
function getAuthed() { try { return sessionStorage.getItem("ts_auth")==="1"; } catch(e){return false;} }
function setAuthed()  { try { sessionStorage.setItem("ts_auth","1"); } catch(e){} }

function LoginScreen({onAuth}) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const attempt = () => {
    if(pw===PASSWORD){ setAuthed(); onAuth(); }
    else { setErr(true); setPw(""); setTimeout(()=>setErr(false),2000); }
  };
  return (
    <div style={{minHeight:"100vh",background:"#0f1923",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#1a2d3d",border:"1px solid #c9a84c",borderRadius:12,padding:"40px 48px",width:"100%",maxWidth:400,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:12}}>🗓️</div>
        <h1 style={{fontSize:22,fontWeight:700,color:"#c9a84c",marginBottom:6}}>First Student</h1>
        <p style={{color:"#8a9bb0",fontSize:14,marginBottom:28}}>Trade Show Calendar</p>
        <input
          type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          placeholder="Enter password"
          style={{width:"100%",background:"#0f1923",border:`1.5px solid ${err?"#ef4444":"#2d3f52"}`,borderRadius:8,padding:"11px 16px",color:"#e8dcc8",fontSize:15,outline:"none",fontFamily:"inherit",marginBottom:12,textAlign:"center",transition:"border-color 0.2s"}}
        />
        {err && <p style={{color:"#ef4444",fontSize:13,marginBottom:8}}>Incorrect password. Try again.</p>}
        <button onClick={attempt} style={{width:"100%",background:"#c9a84c",border:"none",color:"#0f1923",padding:"11px",borderRadius:8,cursor:"pointer",fontSize:15,fontWeight:700,fontFamily:"inherit"}}>
          Enter
        </button>
      </div>
    </div>
  );
}

// ── Export / Import helpers ───────────────────────────────────────────────────
function exportData(shows) {
  const json = JSON.stringify(shows, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `tradeshow-data-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importData(file, onSuccess, onError) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error("Invalid format");
      const normalized = data.map(s=>({...s, department:normalizeDept(s.department||"")}));
      onSuccess(normalized);
    } catch(err) { onError("Could not read file. Make sure it's a valid export."); }
  };
  reader.readAsText(file);
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(getAuthed);
  const [shows, setShows] = useState(()=>{
    const stored = getStored();
    return (stored||INITIAL_SHOWS).map(s=>({...s,department:normalizeDept(s.department||"")}));
  });
  const [tab, setTab] = useState("calendar");
  const [editShow, setEditShow] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [isNew, setIsNew] = useState(false);
  const [nextId, setNextId] = useState(()=>Math.max(0,...(getStored()||INITIAL_SHOWS).map(s=>s.id))+1);
  const [importErr, setImportErr] = useState("");
  const [importOk, setImportOk] = useState(false);
  const fileRef = React.useRef();

  useEffect(()=>{ saveStored(shows); },[shows]);

  if (!authed) return <LoginScreen onAuth={()=>setAuthed(true)}/>;

  const sorted = [...shows].sort((a,b)=>a.start.localeCompare(b.start));

  const openEdit = s => { setEditShow(s); setIsNew(false); setModalOpen(true); };
  const openNew  = () => { setEditShow(null); setIsNew(true); setModalOpen(true); };

  const handleSave = form => {
    const normalized = {...form, department: normalizeDept(form.department||"")};
    if (isNew) {
      setShows(s=>[...s,{...normalized,id:nextId}].sort((a,b)=>a.start.localeCompare(b.start)));
      setNextId(n=>n+1);
    } else {
      setShows(s=>s.map(x=>x.id===normalized.id?normalized:x));
    }
    setModalOpen(false);
  };

  const handleDelete = id => {
    if(confirm("Delete this show?")){ setShows(s=>s.filter(x=>x.id!==id)); setModalOpen(false); }
  };

  const handleImport = e => {
    const file = e.target.files[0]; if(!file) return;
    importData(file,
      data => {
        if(!confirm(`This will replace all ${shows.length} shows with ${data.length} imported shows. Continue?`)) return;
        const maxId = Math.max(0,...data.map(s=>s.id||0));
        setShows(data.sort((a,b)=>a.start.localeCompare(b.start)));
        setNextId(maxId+1);
        setImportOk(true); setTimeout(()=>setImportOk(false),3000);
      },
      msg => { setImportErr(msg); setTimeout(()=>setImportErr(""),3000); }
    );
    e.target.value="";
  };

  const TABS = [{id:"calendar",label:"📅 Calendar"},{id:"cards",label:"📋 Cards"},{id:"attendees",label:"👥 Attendees"}];
  const tabBase={padding:"10px 20px",borderRadius:"6px 6px 0 0",fontSize:14,cursor:"pointer",fontFamily:"inherit",border:"none",background:"transparent",color:"#8a9bb0",fontWeight:400,transition:"all 0.15s"};
  const tabOn={...tabBase,background:"#1a2d3d",color:"#c9a84c",fontWeight:700,borderBottom:"2px solid #c9a84c"};
  const toolBtn={background:"transparent",border:"1px solid #2d3f52",color:"#8a9bb0",padding:"6px 13px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit",transition:"all 0.15s"};

  return (
    <div style={{minHeight:"100vh",background:"#0f1923"}}>
      <div style={{background:"linear-gradient(135deg,#1a2d3d,#0f1923)",borderBottom:"2px solid #c9a84c",padding:"22px 32px 0"}}>
        <div style={{maxWidth:1280,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:12}}>
            <div>
              <h1 style={{fontSize:28,fontWeight:700,color:"#c9a84c",letterSpacing:"-0.5px"}}>First Student Trade Show Calendar</h1>
              <p style={{color:"#8a9bb0",fontSize:13,marginTop:2}}>{shows.length} conferences · rolling calendar</p>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {/* Import/Export */}
              <button onClick={()=>exportData(shows)} style={toolBtn} title="Download all data as JSON">⬇ Export Data</button>
              <button onClick={()=>fileRef.current.click()} style={toolBtn} title="Load a previously exported JSON file">⬆ Import Data</button>
              <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
              {importOk && <span style={{fontSize:12,color:"#22c55e"}}>✓ Imported!</span>}
              {importErr && <span style={{fontSize:12,color:"#ef4444"}}>{importErr}</span>}
              <button onClick={openNew} style={{background:"#c9a84c",border:"none",color:"#0f1923",padding:"9px 18px",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>+ Add Show</button>
            </div>
          </div>
          <div style={{display:"flex",gap:2,marginTop:14}}>
            {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={tab===t.id?tabOn:tabBase}>{t.label}</button>)}
          </div>
        </div>
      </div>

      {/* Sync reminder banner */}
      <div style={{background:"#0d1f2d",borderBottom:"1px solid #1a2d3d",padding:"8px 32px"}}>
        <div style={{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#4a6a7a"}}>💡 Tip: Use <strong style={{color:"#5a8a9a"}}>Export Data</strong> to save your changes, then <strong style={{color:"#5a8a9a"}}>Import Data</strong> on another computer to sync — or re-upload the exported file to GitHub to publish updates for everyone.</span>
        </div>
      </div>

      <div style={{maxWidth:1280,margin:"0 auto",padding:"24px 32px"}}>
        {tab==="calendar"  && <CalendarView  shows={sorted} onEdit={openEdit}/>}
        {tab==="cards"     && <CardView      shows={sorted} onEdit={openEdit}/>}
        {tab==="attendees" && <AttendeesView shows={sorted} onEdit={openEdit}/>}
      </div>
      {modalOpen && <EditModal show={isNew?null:editShow} onSave={handleSave} onClose={()=>setModalOpen(false)} onDelete={handleDelete}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

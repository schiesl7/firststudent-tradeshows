*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--fs-off-white);font-family:'Barlow',sans-serif;color:var(--fs-navy);line-height:1.5;}

input,select,textarea,button{font-family:'Barlow',sans-serif;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,20,50,0.65);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:12px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);border-top:4px solid var(--fs-yellow);}
.show-card{transition:transform 0.15s,box-shadow 0.15s;cursor:pointer;background:#fff;border-radius:8px;border:1px solid var(--fs-gray-200);box-shadow:var(--shadow-sm);}
.show-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.cal-cell{min-height:100px;border:1px solid var(--fs-gray-200);border-radius:4px;padding:4px 3px;background:#fff;overflow:hidden;}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity 0.1s;font-weight:600;}
.cal-event:hover{opacity:0.8;}
.filter-pill{cursor:pointer;transition:all 0.15s;border:none;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--fs-navy);border-left:4px solid var(--fs-yellow);border-radius:8px;padding:13px 20px;color:#fff;font-size:13px;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.progress-bar{height:5px;background:var(--fs-gray-200);border-radius:3px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:var(--fs-yellow);border-radius:3px;transition:width 0.4s ease;}
.receipt-zone{border:2px dashed var(--fs-gray-200);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;}
.receipt-zone:hover,.receipt-zone.drag-over{border-color:var(--fs-yellow);background:rgba(255,209,0,0.05);}

.login-wrap::after{content:'';position:absolute;bottom:-60px;left:-60px;width:300px;height:300px;background:var(--fs-yellow);opacity:0.04;border-radius:50%;}

function fmtRange(start,end){
  const s=new Date(start+"T12:00:00"),e=new Date(end+"T12:00:00"),o={month:"short",day:"numeric"};
  if(start===end)return s.toLocaleDateString("en-US",o);
  if(s.getMonth()===e.getMonth()&&s.getFullYear()===e.getFullYear())return `${s.toLocaleDateString("en-US",o)} – ${e.getDate()}`;
  return `${s.toLocaleDateString("en-US",o)} – ${e.toLocaleDateString("en-US",o)}`;
}
function daysUntil(d){if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((new Date(d+"T00:00:00")-t)/86400000);}
function uid(){return "id_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);}
function fmtDate(d){if(!d)return "—";return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function completionPct(show){const c=[show.city,show.start,show.venue,show.booth?.number&&show.booth.number!=="TBD",show.hotel?.confirmNumber,show.attendees,show.swag];return Math.round(c.filter(Boolean).length/c.length*100);}
function budgetTotal(show){const b=show.budget||{};return (b.booth||0)+(b.travel||0)+(b.hotel||0)+(b.swag||0)+(b.other||0);}
 
function generateICS(show){
  const pad=n=>String(n).padStart(2,"0");
  function toD(ds){const d=new Date(ds+"T12:00:00");return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;}
  const endD=new Date(show.end+"T12:00:00");endD.setDate(endD.getDate()+1);
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//First Student Trade Show PMS//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH","BEGIN:VEVENT",
    `UID:tradeshow-${show.id}-${Date.now()}@firststudent`,`DTSTART;VALUE=DATE:${toD(show.start)}`,
    `DTEND;VALUE=DATE:${endD.getFullYear()}${pad(endD.getMonth()+1)}${pad(endD.getDate())}`,
    `SUMMARY:${show.name}${show.city?" – "+show.city:""}`,show.city?`LOCATION:${show.city}`:"","END:VEVENT","END:VCALENDAR"].filter(Boolean).join("\r\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar;charset=utf-8"}));
  a.download=`${show.name.replace(/[^a-z0-9]/gi,"-")}.ics`;a.click();
}
 
function generateAlerts(shows){
  const alerts=[];
  shows.forEach(show=>{
    if(show.status==="complete")return;
    const days=daysUntil(show.start);
    if(days!==null&&days>=0&&days<=7)alerts.push({type:"urgent",text:`${show.name} is ${days===0?"TODAY":`in ${days} day${days!==1?"s":""}`}`,showId:show.id});
    (show.reminders||[]).forEach(r=>{
      if(r.done)return;
      const rd=daysUntil(r.date);
      if(rd!==null&&rd<0)alerts.push({type:"urgent",text:`[${show.name}] OVERDUE: ${r.text}`,showId:show.id});
      else if(rd!==null&&rd<=3)alerts.push({type:"warning",text:`[${show.name}] Due soon: ${r.text} (${fmtDate(r.date)})`,showId:show.id});
    });
    if(!show.hotel?.confirmNumber&&days!==null&&days<=30&&days>=0)alerts.push({type:"info",text:`[${show.name}] Hotel not confirmed`,showId:show.id});
  });
  return alerts;
}

function SettingsModal({onClose,toast}){
  const [s,setS]=useState(()=>({userName:"",teamsWebhook:"",notifyChanges:true,notifyReminders:true,...getSettings()}));
  const set=(k,v)=>setS(prev=>({...prev,[k]:v}));
  const [pwForm,setPwForm]=useState({current:"",next:"",confirm:""});
  const setPw=(k,v)=>setPwForm(f=>({...f,[k]:v}));
  const [pwErr,setPwErr]=useState("");
  const [pwSuccess,setPwSuccess]=useState(false);
 
  const save=()=>{saveSettings(s);toast("Settings saved","success");onClose();};
 
  const changePassword=()=>{
    setPwErr("");setPwSuccess(false);
    if(!pwForm.current){setPwErr("Enter your current password.");return;}
    if(pwForm.current!==getPassword()){setPwErr("Current password is incorrect.");return;}
    if(!pwForm.next||pwForm.next.length<6){setPwErr("New password must be at least 6 characters.");return;}
    if(pwForm.next!==pwForm.confirm){setPwErr("New passwords don't match.");return;}
    savePassword(pwForm.next);
    setPwForm({current:"",next:"",confirm:""});
    setPwSuccess(true);
    toast("Password updated successfully","success");
  };
 
  const inp={width:"100%",background:"#F4F6F9",border:"1.5px solid #D6DCE8",borderRadius:6,padding:"8px 12px",color:"#002856",fontSize:14,outline:"none"};
  const lbl={fontSize:11,color:"#4A5F7A",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4,display:"block",fontWeight:700};
 
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal" style={{maxWidth:540}}>
      <div style={{padding:"16px 22px",borderBottom:"2px solid #FFD100",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#002856",borderRadius:"12px 12px 0 0"}}>
        <h2 style={{color:"#FFD100",fontSize:17,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,letterSpacing:1}}>⚙️ SETTINGS</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#FFD100",fontSize:24,cursor:"pointer"}}>×</button>
      </div>
      <div style={{padding:"20px 22px",display:"grid",gap:20}}>
 
        {/* General */}
        <div style={{display:"grid",gap:12}}>
          <div style={{fontSize:12,fontWeight:800,color:"#002856",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",borderBottom:"2px solid #FFD100",paddingBottom:6}}>General</div>
          <div><label style={lbl}>Your Name</label><input value={s.userName||""} onChange={e=>set("userName",e.target.value)} style={inp}/></div>
          <div><label style={lbl}>Microsoft Teams Webhook URL</label><input value={s.teamsWebhook||""} onChange={e=>set("teamsWebhook",e.target.value)} placeholder="https://outlook.office.com/webhook/…" style={inp}/></div>
          {[["notifyChanges","Notify on show changes"],["notifyReminders","Notify on reminders"]].map(([k,label])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#F4F6F9",borderRadius:8,border:"1px solid #D6DCE8"}}>
              <span style={{fontSize:13,color:"#002856",fontWeight:600}}>{label}</span>
              <button onClick={()=>set(k,!s[k])} style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",position:"relative",background:s[k]?"#FFD100":"#D6DCE8",flexShrink:0}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:s[k]?"#002856":"white",position:"absolute",top:3,left:s[k]?23:3,transition:"left 0.2s"}}/>
              </button>
            </div>
          ))}
        </div>
 
        {/* Change Password */}
        <div style={{display:"grid",gap:12}}>
          <div style={{fontSize:12,fontWeight:800,color:"#002856",textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",borderBottom:"2px solid #FFD100",paddingBottom:6}}>Change Password</div>
          <div><label style={lbl}>Current Password</label><input type="password" value={pwForm.current} onChange={e=>setPw("current",e.target.value)} placeholder="Enter current password" style={{...inp,border:`1.5px solid ${pwErr&&!pwForm.current?"#D0021B":"#D6DCE8"}`}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><label style={lbl}>New Password</label><input type="password" value={pwForm.next} onChange={e=>setPw("next",e.target.value)} placeholder="Min. 6 characters" style={inp}/></div>
            <div><label style={lbl}>Confirm New Password</label><input type="password" value={pwForm.confirm} onChange={e=>setPw("confirm",e.target.value)} placeholder="Repeat new password" style={inp}/></div>
          </div>
          {pwErr&&<div style={{fontSize:12,color:"#D0021B",background:"#FEE2E2",border:"1px solid #FECACA",borderRadius:6,padding:"8px 12px",fontWeight:600}}>⚠️ {pwErr}</div>}
          {pwSuccess&&<div style={{fontSize:12,color:"#1A8C4E",background:"#E6F4ED",border:"1px solid #1A8C4E44",borderRadius:6,padding:"8px 12px",fontWeight:600}}>✅ Password updated! Use the new password next time you log in.</div>}
          <button onClick={changePassword} style={{background:"#002856",border:"none",color:"#FFD100",padding:"9px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.5,alignSelf:"start"}}>UPDATE PASSWORD</button>
        </div>
 
      </div>
      <div style={{padding:"14px 22px",borderTop:"1px solid #EEF1F6",display:"flex",justifyContent:"flex-end",gap:10,background:"#F4F6F9",borderRadius:"0 0 12px 12px"}}>
        <button onClick={onClose} style={{background:"transparent",border:"1px solid #D6DCE8",color:"#4A5F7A",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600}}>Cancel</button>
        <button onClick={save} style={{background:"#FFD100",border:"none",color:"#002856",padding:"7px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>SAVE SETTINGS</button>
      </div>
    </div>
  </div>;
}
 
function getAuthed(){try{return sessionStorage.getItem("ts_auth")==="1";}catch(e){return false;}}
function setAuthed(){try{sessionStorage.setItem("ts_auth","1");}catch(e){}}
 
function LoginScreen({onAuth}){
  const [pw,setPw]=useState(""),[err,setErr]=useState(false);
  const attempt=()=>{if(pw===getPassword()){setAuthed();onAuth();}else{setErr(true);setPw("");setTimeout(()=>setErr(false),2000);}};
  return <div className="login-wrap">
    <div style={{background:"#fff",borderRadius:16,padding:"48px 52px",width:"100%",maxWidth:420,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.3)",position:"relative",zIndex:1}}>
      <div style={{marginBottom:24,display:"flex",justifyContent:"center"}}>
        <svg viewBox="0 0 220 58" width="210" height="55" xmlns="http://www.w3.org/2000/svg">
          <rect width="220" height="58" rx="6" fill="#002856"/>
          <text x="12" y="38" fontFamily="'Barlow Condensed',Barlow,sans-serif" fontSize="30" fontWeight="800" fill="#FFD100" letterSpacing="1">FIRST STUDENT</text>
          <rect x="12" y="44" width="196" height="3" fill="#FFD100" opacity="0.6"/>
        </svg>
      </div>
      <p style={{color:"#4A5F7A",fontSize:14,marginBottom:28,fontWeight:600}}>Trade Show Management System</p>
      <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="Enter password"
        style={{width:"100%",background:"#F4F6F9",border:`2px solid ${err?"#D0021B":"#D6DCE8"}`,borderRadius:8,padding:"12px 16px",color:"#002856",fontSize:15,outline:"none",marginBottom:12,textAlign:"center",fontWeight:600,transition:"border-color 0.2s"}}/>
      {err&&<p style={{color:"#D0021B",fontSize:13,marginBottom:8,fontWeight:600}}>Incorrect password.</p>}
      <button onClick={attempt} style={{width:"100%",background:"#FFD100",border:"none",color:"#002856",padding:"12px",borderRadius:8,cursor:"pointer",fontSize:15,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>ENTER</button>
    </div>
  </div>;
}
 
function exportData(shows){const blob=new Blob([JSON.stringify(shows,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`fs-tradeshows-${new Date().toISOString().slice(0,10)}.json`;a.click();}
function importDataFile(file,onSuccess,onError){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!Array.isArray(d))throw new Error();onSuccess(d.map(s=>({...s,department:normalizeDept(s.department||"")})));}catch(err){onError("Could not read file.");}};r.readAsText(file);}
 
function App(){
  const [authed,setAuthed]=useState(getAuthed);
  const [shows,setShows]=useState(()=>(getStored()||INITIAL_SHOWS).map(s=>({...s,department:normalizeDept(s.department||"")})));
  const [tab,setTab]=useState("calendar");
  const [editShow,setEditShow]=useState(null);
  const [modalOpen,setModalOpen]=useState(false);
  const [isNew,setIsNew]=useState(false);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [nextId,setNextId]=useState(()=>Math.max(0,...(getStored()||INITIAL_SHOWS).map(s=>s.id||0))+1);
  const [toastMsg,setToastMsg]=useState(null);
  const fileRef=useRef();
  useEffect(()=>{saveStored(shows);},[shows]);
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  const sorted=[...shows].sort((a,b)=>a.start.localeCompare(b.start));
  const alerts=generateAlerts(shows),settings=getSettings();
  const toast=(msg,type="info")=>setToastMsg({msg,type});
  const openEdit=s=>{setEditShow(s);setIsNew(false);setModalOpen(true);};
  const openNew=()=>{setEditShow(null);setIsNew(true);setModalOpen(true);};
  const handleSave=form=>{
    const norm={...form,department:normalizeDept(form.department||"")};
    if(isNew){setShows(s=>[...s,{...norm,id:nextId,changeLog:[{user:settings.userName||"User",field:"Show created",oldVal:"",newVal:"",ts:Date.now()}]}].sort((a,b)=>a.start.localeCompare(b.start)));setNextId(n=>n+1);toast(`${form.name} added`,"success");}
    else{const old=shows.find(x=>x.id===norm.id),changes=[];if(old&&old.status!==norm.status)changes.push({user:settings.userName||"User",field:"Status",oldVal:old.status,newVal:norm.status,ts:Date.now()});setShows(s=>s.map(x=>x.id===norm.id?{...norm,changeLog:[...(norm.changeLog||[]),...changes]}:x));toast(`${form.name} saved`,"success");}
    setModalOpen(false);
  };
  const handleDelete=id=>{const s=shows.find(x=>x.id===id);if(confirm(`Delete "${s?.name}"?`)){setShows(s=>s.filter(x=>x.id!==id));setModalOpen(false);toast(`${s?.name} deleted`,"warning");}};
  const handleImport=e=>{const file=e.target.files[0];if(!file)return;importDataFile(file,data=>{if(!confirm(`Replace ${shows.length} shows with ${data.length} imported?`))return;setShows(data.sort((a,b)=>a.start.localeCompare(b.start)));setNextId(Math.max(0,...data.map(s=>s.id||0))+1);toast(`Imported ${data.length} shows`,"success");},msg=>toast(msg,"error"));e.target.value="";};
 
  const TABS=[{id:"calendar",label:"📅 Calendar"},{id:"cards",label:"📋 Cards"},{id:"attendees",label:"👥 Attendees"},{id:"alerts",label:`⚡ Alerts${alerts.length>0?` (${alerts.length})`:""}`,alert:alerts.length>0}];
 
  return <div style={{minHeight:"100vh",background:"#F4F6F9"}}>
    <div style={{background:"#002856",borderBottom:"4px solid #FFD100",padding:"0 32px"}}>
      <div style={{maxWidth:1280,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 0 14px",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <svg viewBox="0 0 160 42" width="160" height="42" xmlns="http://www.w3.org/2000/svg">
              <text x="0" y="30" fontFamily="'Barlow Condensed',Barlow,sans-serif" fontSize="26" fontWeight="800" fill="#FFD100" letterSpacing="0.5">FIRST STUDENT</text>
              <rect x="0" y="34" width="156" height="2" fill="#FFD100" opacity="0.5"/>
            </svg>
            <div style={{borderLeft:"1px solid rgba(255,255,255,0.2)",paddingLeft:16}}>
              <div style={{fontSize:13,fontWeight:800,color:"#fff",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif"}}>TRADE SHOW PMS</div>
              <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginTop:1}}>{shows.length} conferences · {alerts.length>0?<span style={{color:"#FFD100",fontWeight:700}}>{alerts.length} alert{alerts.length!==1?"s":""}</span>:"all clear"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>exportData(shows)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>⬇ Export</button>
            <button onClick={()=>fileRef.current.click()} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>⬆ Import</button>
            <input ref={fileRef} type="file" accept=".json" onChange={handleImport} style={{display:"none"}}/>
            <button onClick={()=>setSettingsOpen(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>⚙️ Settings</button>
            <button onClick={openNew} style={{background:"#FFD100",border:"none",color:"#002856",padding:"9px 20px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.5}}>+ ADD SHOW</button>
          </div>
        </div>
        <div style={{display:"flex",gap:0}}>
          {TABS.map(t=>{const active=tab===t.id;return <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 22px",fontSize:13,cursor:"pointer",fontFamily:"'Barlow',sans-serif",fontWeight:700,border:"none",background:active?"#FFD100":"transparent",color:t.alert&&!active?"#FFD100":active?"#002856":"rgba(255,255,255,0.7)",borderRadius:active?"6px 6px 0 0":"6px 6px 0 0",letterSpacing:0.3,transition:"all 0.15s"}}>{t.label}</button>;})}
        </div>
      </div>
    </div>
    <div style={{background:"#fff",borderBottom:"1px solid #EEF1F6",padding:"7px 32px"}}>
      <div style={{maxWidth:1280,margin:"0 auto",fontSize:11,color:"#8A9BB8",fontWeight:600}}>
        💡 <strong style={{color:"#002856"}}>Export</strong> to save your data · <strong style={{color:"#002856"}}>Import</strong> to sync across computers · Re-upload to GitHub Pages to share updates with the team
      </div>
    </div>
    <div style={{maxWidth:1280,margin:"0 auto",padding:"24px 32px"}}>
      {tab==="calendar"&&<CalendarView shows={sorted} onEdit={openEdit}/>}
      {tab==="cards"&&<CardView shows={sorted} onEdit={openEdit}/>}
      {tab==="attendees"&&<AttendeesView shows={sorted} onEdit={openEdit}/>}
      {tab==="alerts"&&<AlertsView shows={sorted} onEdit={openEdit}/>}
    </div>
    {modalOpen&&<EditModal show={isNew?null:editShow} onSave={handleSave} onClose={()=>setModalOpen(false)} onDelete={handleDelete} toast={toast}/>}
    {settingsOpen&&<SettingsModal onClose={()=>setSettingsOpen(false)} toast={toast}/>}
    {toastMsg&&<Toast msg={toastMsg.msg} type={toastMsg.type} onDone={()=>setToastMsg(null)}/>}
  </div>;
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>First Student — Let's Connect</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1923;font-family:'Georgia','Times New Roman',serif;color:#e8dcc8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 60%);pointer-events:none;}
.card{background:#1a2d3d;border:1px solid #c9a84c;border-radius:16px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.6);position:relative;z-index:1;}
.card-header{padding:28px 28px 20px;background:linear-gradient(135deg,rgba(201,168,76,0.1) 0%,transparent 60%);border-bottom:1px solid #2d3f52;text-align:center;}
.logo{width:48px;height:48px;background:#c9a84c;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#0f1923;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.form-label{font-size:10px;color:#8a9bb0;text-transform:uppercase;letter-spacing:1px;}
.form-input,.form-select,.form-textarea{background:#0f1923;border:1px solid #2d3f52;border-radius:6px;color:#e8dcc8;font-family:inherit;font-size:15px;padding:11px 14px;outline:none;width:100%;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#c9a84c;}
.form-select option{background:#1a2d3d;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-textarea{resize:vertical;min-height:70px;}
.divider{border:none;border-top:1px solid #2d3f52;margin:18px 0;}
.section-label{font-size:10px;color:#4a5a6a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;font-weight:700;}
.btn-submit{width:100%;padding:14px;background:#c9a84c;color:#0f1923;border:none;border-radius:8px;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.2s;margin-top:6px;}
.btn-submit:hover{background:#e8c25a;transform:translateY(-1px);}
.opt-in{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;}
.opt-in input{margin-top:3px;accent-color:#c9a84c;flex-shrink:0;}
.opt-in label{font-size:12px;color:#8a9bb0;line-height:1.5;}
.footer-note{margin-top:20px;text-align:center;font-size:11px;color:#2d3f52;position:relative;z-index:1;}
@media(max-width:480px){.form-row{grid-template-columns:1fr;}.card-header{padding:20px 20px 16px;}}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">FS</div>
    <div style="font-size:22px;font-weight:700;color:#c9a84c;letter-spacing:-0.5px;margin-bottom:5px">Let's <span style="color:#e8dcc8">Connect</span></div>
    <div style="font-size:13px;color:#8a9bb0">First Student — North America's Largest Student Transporter</div>
    <div id="showBadge" style="display:none;margin-top:10px">
      <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);padding:5px 14px;border-radius:20px;font-size:11px;color:#c9a84c">📍 <span id="showBadgeText"></span></span>
    </div>
  </div>
  <div style="padding:24px 28px">
    <form action="https://formspree.io/f/xkoqpppw" method="POST">
      <input type="hidden" name="_subject" id="fSubject" value="New Lead — Trade Show">
      <input type="hidden" name="Trade Show" id="fShowName" value="Trade Show">
      <input type="hidden" name="_next" value="https://schiesl7.github.io/firststudent-tradeshows/lead/thanks.html">
 
      <div class="section-label">Your Info</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name *</label><input type="text" class="form-input" name="First Name" placeholder="Jane" required autocomplete="given-name"></div>
        <div class="form-group"><label class="form-label">Last Name *</label><input type="text" class="form-input" name="Last Name" placeholder="Smith" required autocomplete="family-name"></div>
      </div>
      <div class="form-group"><label class="form-label">Title / Role</label><input type="text" class="form-input" name="Title" placeholder="Director of Transportation" autocomplete="organization-title"></div>
      <div class="form-group"><label class="form-label">School District / Organization *</label><input type="text" class="form-input" name="District / Org" placeholder="Springfield Unified School District" required autocomplete="organization"></div>
 
      <hr class="divider">
      <div class="section-label">Contact</div>
      <div class="form-group"><label class="form-label">Email Address *</label><input type="email" class="form-input" name="Email" placeholder="jane@district.edu" required autocomplete="email"></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-input" name="Phone" placeholder="(555) 000-0000" autocomplete="tel"></div>
 
      <hr class="divider">
      <div class="section-label">How Can We Help?</div>
      <div class="form-group">
        <label class="form-label">Area of Interest</label>
        <select class="form-select" name="Interest">
          <option value="">Select one…</option>
          <option>Home-to-School Transportation</option>
          <option>Fleet as a Service</option>
          <option>First Alt (Alternative Transportation)</option>
          <option>Special Needs / SPED Transportation</option>
          <option>Charter / Field Trips</option>
          <option>Contract Renewal / RFP</option>
          <option>Just exploring options</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Notes / Questions</label><textarea class="form-textarea" name="Notes" placeholder="Anything specific you'd like to discuss?"></textarea></div>
 
      <div class="opt-in">
        <input type="checkbox" name="Opt In" value="Yes" id="fOptIn" checked>
        <label for="fOptIn">I'm interested in learning more from First Student and agree to be contacted about transportation solutions.</label>
      </div>
      <button type="submit" class="btn-submit">Submit &amp; Connect →</button>
    </form>
  </div>
</div>
<div class="footer-note">First Student · North America's Largest School Transportation Provider</div>
<script>
(function(){
  const id = new URLSearchParams(window.location.search).get("show") || "";
  if (!id) return;
  try {
    const shows = JSON.parse(localStorage.getItem("fs_pms_v3") || "[]");
    const show = shows.find(s => String(s.id) === String(id));
    const name = show ? show.name : id;
    document.getElementById("fSubject").value = "New Lead — " + name;
    document.getElementById("fShowName").value = name;
    document.getElementById("showBadge").style.display = "block";
    document.getElementById("showBadgeText").textContent = name;
    document.title = "First Student — " + name;
  } catch(e) {}
})();
</script>
</body>
</html>
